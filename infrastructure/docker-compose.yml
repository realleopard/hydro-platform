version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hydro
      POSTGRES_PASSWORD: hydro123
      POSTGRES_DB: hydro_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - watershed-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - watershed-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    hostname: watershed-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: hydro
      RABBITMQ_DEFAULT_PASS: hydro123
      RABBITMQ_DEFAULT_VHOST: watershed
    ports:
      - "5672:5672"     # AMQP 端口
      - "15672:15672"   # 管理界面端口
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - watershed-network

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: watershed-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - watershed-network

  grafana:
    image: grafana/grafana:10.1.0
    container_name: watershed-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - watershed-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      ENV: development
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: hydro
      DB_PASSWORD: hydro123
      DB_NAME: hydro_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: hydro
      RABBITMQ_PASSWORD: hydro123
      RABBITMQ_VHOST: watershed
      JWT_SECRET: hydro-platform-secret-key
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - watershed-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  watershed-network:
    driver: bridge
