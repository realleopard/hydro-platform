groups:
  - name: watershed-alerts
    rules:
      # 后端服务不可用告警
      - alert: BackendDown
        expr: up{job="watershed-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Watershed Backend is down"
          description: "Backend service has been down for more than 1 minute"

      # 高错误率告警
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for the last 2 minutes"

      # 高响应时间告警
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "95th percentile response time is above 2 seconds"

      # JVM 内存使用告警
      - alert: JvmMemoryHigh
        expr: jvm_memory_used_bytes / jvm_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM memory usage is high"
          description: "JVM memory usage is above 85%"

      # 数据库连接池告警
      - alert: DatabaseConnectionPoolHigh
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.8
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool is near capacity"
          description: "More than 80% of database connections are in use"

      # RabbitMQ 队列堆积告警
      - alert: RabbitMQQueueHigh
        expr: rabbitmq_queue_messages > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue has high message count"
          description: "Queue {{ $labels.queue }} has more than 10000 messages"
