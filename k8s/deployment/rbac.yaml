apiVersion: v1
kind: ServiceAccount
metadata:
  name: watershed-service-account
  namespace: watershed-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: watershed-role
  namespace: watershed-system
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: watershed-role-binding
  namespace: watershed-system
subjects:
  - kind: ServiceAccount
    name: watershed-service-account
    namespace: watershed-system
roleRef:
  kind: Role
  name: watershed-role
  apiGroup: rbac.authorization.k8s.io
