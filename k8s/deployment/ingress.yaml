apiVersion: v1
kind: Namespace
metadata:
  name: watershed-system
  labels:
    name: watershed-system
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: watershed-ingress
  namespace: watershed-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: watershed.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: watershed-frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: watershed-backend
                port:
                  number: 8080
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: watershed-backend
                port:
                  number: 8080
  tls:
    - hosts:
        - watershed.local
      secretName: watershed-tls-secret
