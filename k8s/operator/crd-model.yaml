apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: watershedmodels.watershed.example.com
spec:
  group: watershed.example.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                version:
                  type: string
                image:
                  type: string
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                inputs:
                  type: array
                  items:
                    type: object
                outputs:
                  type: array
                  items:
                    type: object
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                lastExecutionTime:
                  type: string
      additionalPrinterColumns:
        - name: Name
          type: string
          jsonPath: .spec.name
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Phase
          type: string
          jsonPath: .status.phase
  scope: Namespaced
  names:
    plural: watershedmodels
    singular: watershedmodel
    kind: WatershedModel
    shortNames:
      - wsm
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: watershedtasks.watershed.example.com
spec:
  group: watershed.example.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                modelRef:
                  type: string
                workflowId:
                  type: string
                parameters:
                  type: object
                inputs:
                  type: object
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                startTime:
                  type: string
                endTime:
                  type: string
                outputPath:
                  type: string
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.modelRef
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: watershedtasks
    singular: watershedtask
    kind: WatershedTask
    shortNames:
      - wst
